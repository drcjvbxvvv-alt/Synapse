# Synapse CI/CD 流程配置
# 自动化构建、测试、部署流程

stages:
  - lint
  - test
  - build
  - push
  - deploy

variables:
  HARBOR_REGISTRY: "harbor.local"
  HARBOR_USERNAME: "admin"
  HARBOR_PASSWORD: "Harbor@2026"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # 镜像版本策略：使用 commit SHA 作为 tag
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  BACKEND_IMAGE: "${HARBOR_REGISTRY}/synapse/backend:${IMAGE_TAG}"
  BACKEND_IMAGE_LATEST: "${HARBOR_REGISTRY}/synapse/backend:latest"
  FRONTEND_IMAGE: "${HARBOR_REGISTRY}/synapse/frontend:${IMAGE_TAG}"
  FRONTEND_IMAGE_LATEST: "${HARBOR_REGISTRY}/synapse/frontend:latest"

# ─── Lint Stage ───────────────────────────────────────────────────────────────

lint:backend:go:
  stage: lint
  image: golangci/golangci-lint:latest
  only:
    - main
    - merge_requests
  script:
    - golangci-lint run ./cmd ./internal ./pkg --timeout 5m
  allow_failure: true
  cache:
    paths:
      - .cache/golangci-lint

lint:frontend:eslint:
  stage: lint
  image: node:22-alpine
  only:
    - main
    - merge_requests
  script:
    - cd ui
    - npm ci --frozen-lockfile
    - npm run lint
  cache:
    paths:
      - ui/node_modules

lint:frontend:i18n:
  stage: lint
  image: node:22-alpine
  only:
    - main
    - merge_requests
  script:
    - cd ui
    - npm ci --frozen-lockfile
    - npm run i18n-lint
  allow_failure: true
  cache:
    paths:
      - ui/node_modules

# ─── Test Stage ───────────────────────────────────────────────────────────────

test:backend:unit:
  stage: test
  image: golang:1.25-alpine
  only:
    - main
    - merge_requests
  before_script:
    - apk add --no-cache sqlite
  script:
    - go test -v -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/... ./pkg/...
    - go tool cover -func=coverage.out | tail -1
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.out
    paths:
      - coverage.out
    expire_in: 7 days
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+\%)/'

test:frontend:unit:
  stage: test
  image: node:22-alpine
  only:
    - main
    - merge_requests
  script:
    - cd ui
    - npm ci --frozen-lockfile
    - npm run test:coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ui/coverage/cobertura-coverage.xml
    paths:
      - ui/coverage
    expire_in: 7 days
  cache:
    paths:
      - ui/node_modules

test:backend:integration:
  stage: test
  image: golang:1.25-alpine
  services:
    - postgres:15
    - redis:7-alpine
  variables:
    POSTGRES_DB: "synapse_test"
    POSTGRES_USER: "test"
    POSTGRES_PASSWORD: "test123"
    DB_HOST: "postgres"
    REDIS_HOST: "redis"
  only:
    - main
  script:
    - apk add --no-cache postgresql-client
    - go test -v -race -tags=integration ./internal/...
  allow_failure: true

# ─── Build Stage ──────────────────────────────────────────────────────────────

build:backend:
  stage: build
  image: golang:1.25-alpine
  only:
    - main
    - tags
  before_script:
    - apk add --no-cache git make
  script:
    - make build VERSION=${CI_COMMIT_SHA}
  artifacts:
    paths:
      - bin/synapse
    expire_in: 1 day

build:frontend:
  stage: build
  image: node:22-alpine
  only:
    - main
    - tags
  script:
    - cd ui
    - npm ci --frozen-lockfile
    - npm run build
    - ls -lah dist/
  artifacts:
    paths:
      - ui/dist
    expire_in: 1 day
  cache:
    paths:
      - ui/node_modules

# ─── Push to Harbor ───────────────────────────────────────────────────────────

push:docker:backend:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  only:
    - main
    - tags
  dependencies:
    - build:backend
  before_script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_REGISTRY
  script:
    - docker build -f deploy/docker/backend/Dockerfile -t $BACKEND_IMAGE .
    - docker push $BACKEND_IMAGE
    - docker tag $BACKEND_IMAGE $BACKEND_IMAGE_LATEST
    - docker push $BACKEND_IMAGE_LATEST
  after_script:
    - docker logout

push:docker:frontend:
  stage: push
  image: docker:latest
  services:
    - docker:dind
  only:
    - main
    - tags
  dependencies:
    - build:frontend
  before_script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_REGISTRY
  script:
    - docker build -f deploy/docker/frontend/Dockerfile -t $FRONTEND_IMAGE .
    - docker push $FRONTEND_IMAGE
    - docker tag $FRONTEND_IMAGE $FRONTEND_IMAGE_LATEST
    - docker push $FRONTEND_IMAGE_LATEST
  after_script:
    - docker logout

# ─── Deploy to K8s (通过 ArgoCD) ──────────────────────────────────────────────

deploy:update:k8s:config:
  stage: deploy
  image: alpine:latest
  only:
    - main
  script:
    # 更新 K8s 部署配置中的镜像版本
    - apk add --no-cache git curl jq

    # 配置 Git（用于提交更新）
    - git config --global user.email "cicd@synapse.local"
    - git config --global user.name "GitLab CI/CD"

    # 更新后端镜像版本
    - sed -i "s|image: .*synapse/backend:.*|image: $BACKEND_IMAGE|g" deploy/k8s/synapse-deployment.yaml

    # 更新前端镜像版本
    - sed -i "s|image: .*synapse/frontend:.*|image: $FRONTEND_IMAGE|g" deploy/k8s/synapse-deployment.yaml

    # 验证配置是否有效
    - cat deploy/k8s/synapse-deployment.yaml

    # 提交更新
    - git add deploy/k8s/synapse-deployment.yaml
    - git commit -m "ci: update Synapse images to ${IMAGE_TAG}"
    - git push origin main
  environment:
    name: production
    kubernetes:
      namespace: synapse
  allow_failure: false

deploy:notify:argocd:
  stage: deploy
  image: alpine:latest
  only:
    - main
  script:
    - apk add --no-cache curl

    # 触发 ArgoCD 手动同步
    - |
      curl -X POST \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        -H "Content-Type: application/json" \
        "http://argocd.local:8081/api/v1/applications/synapse/sync" \
        -d '{
          "strategy": "auto",
          "syncOptions": ["CreateNamespace=true"],
          "dryRun": false,
          "prune": true
        }'

    # 等待同步完成
    - sleep 10

    # 检查应用状态
    - |
      curl -X GET \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        "http://argocd.local:8081/api/v1/applications/synapse"
  allow_failure: true

# ─── Rollback Stage（可选，手动触发） ──────────────────────────────────────────

rollback:previous:
  stage: deploy
  image: alpine:latest
  when: manual
  script:
    - apk add --no-cache curl

    # 获取上一个 revision
    - |
      curl -X GET \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        "http://argocd.local:8081/api/v1/applications/synapse/revisions" | \
        jq '.revisions[1]'

    # 回滚到上一个版本
    - |
      curl -X PUT \
        -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
        -H "Content-Type: application/json" \
        "http://argocd.local:8081/api/v1/applications/synapse" \
        -d '{
          "spec": {
            "source": {
              "targetRevision": "HEAD~1"
            }
          }
        }'
  environment:
    name: production
    kubernetes:
      namespace: synapse
    action: rollback
