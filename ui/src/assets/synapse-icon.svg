<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Blue → Cyan gradient along the S-curve -->
    <linearGradient id="curveGrad" x1="27" y1="28" x2="73" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>

    <!-- Glow filter for nodes and dots -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Softer glow for orbit halos -->
    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Satellite connection lines ── -->
  <line x1="9"  y1="11" x2="27" y2="28" stroke="#3B82F6" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
  <line x1="7"  y1="33" x2="27" y2="28" stroke="#3B82F6" stroke-width="1.4" stroke-linecap="round" opacity="0.32"/>
  <line x1="27" y1="8"  x2="27" y2="28" stroke="#60A5FA" stroke-width="1.4" stroke-linecap="round" opacity="0.32"/>

  <line x1="91" y1="89" x2="73" y2="72" stroke="#22D3EE" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
  <line x1="93" y1="67" x2="73" y2="72" stroke="#22D3EE" stroke-width="1.4" stroke-linecap="round" opacity="0.32"/>
  <line x1="73" y1="92" x2="73" y2="72" stroke="#67E8F9" stroke-width="1.4" stroke-linecap="round" opacity="0.32"/>

  <!-- ── Main synapse S-curve ── -->
  <path d="M27,28 C27,52 73,48 73,72"
        stroke="url(#curveGrad)" stroke-width="3" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- ── Neurotransmitter signal dots along the curve ── -->
  <!-- Positions computed from cubic Bézier at t=0.25, 0.50, 0.75 -->
  <circle cx="34" cy="42" r="3.6" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="3.6" fill="#38BDF8" filter="url(#glow)"/>
  <circle cx="66" cy="58" r="3.6" fill="#22D3EE" filter="url(#glow)"/>

  <!-- ── Satellite cluster nodes ── -->
  <circle cx="9"  cy="11" r="4.5" fill="#3B82F6" opacity="0.72"/>
  <circle cx="7"  cy="33" r="3.2" fill="#3B82F6" opacity="0.52"/>
  <circle cx="27" cy="8"  r="3.2" fill="#60A5FA" opacity="0.52"/>

  <circle cx="91" cy="89" r="4.5" fill="#22D3EE" opacity="0.72"/>
  <circle cx="93" cy="67" r="3.2" fill="#22D3EE" opacity="0.52"/>
  <circle cx="73" cy="92" r="3.2" fill="#67E8F9" opacity="0.52"/>

  <!-- ── Pre-synaptic terminal (blue node, upper-left) ── -->
  <!-- Halo -->
  <circle cx="27" cy="28" r="17" fill="#3B82F6" opacity="0.13" filter="url(#halo)"/>
  <!-- Ring -->
  <circle cx="27" cy="28" r="17" stroke="#3B82F6" stroke-width="2" opacity="0.88"/>
  <!-- Mid fill -->
  <circle cx="27" cy="28" r="9"  fill="#3B82F6" opacity="0.38"/>
  <!-- Core -->
  <circle cx="27" cy="28" r="6"  fill="#3B82F6" filter="url(#glow)"/>

  <!-- ── Post-synaptic terminal (cyan node, lower-right) ── -->
  <!-- Halo -->
  <circle cx="73" cy="72" r="17" fill="#22D3EE" opacity="0.13" filter="url(#halo)"/>
  <!-- Ring -->
  <circle cx="73" cy="72" r="17" stroke="#22D3EE" stroke-width="2" opacity="0.88"/>
  <!-- Mid fill -->
  <circle cx="73" cy="72" r="9"  fill="#22D3EE" opacity="0.38"/>
  <!-- Core -->
  <circle cx="73" cy="72" r="6"  fill="#22D3EE" filter="url(#glow)"/>
</svg>
