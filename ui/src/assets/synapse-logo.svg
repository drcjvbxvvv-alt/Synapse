<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <defs>
    <linearGradient id="curveGrad" x1="19" y1="20" x2="52" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ══ ICON (72×72, scaled from 100×100 viewBox ×0.72) ══ -->

  <!-- Satellite lines -->
  <line x1="6"  y1="8"  x2="19" y2="20" stroke="#3B82F6" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
  <line x1="5"  y1="24" x2="19" y2="20" stroke="#3B82F6" stroke-width="1.1" stroke-linecap="round" opacity="0.32"/>
  <line x1="65" y1="64" x2="52" y2="52" stroke="#22D3EE" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>
  <line x1="67" y1="48" x2="52" y2="52" stroke="#22D3EE" stroke-width="1.1" stroke-linecap="round" opacity="0.32"/>

  <!-- S-curve -->
  <path d="M19,20 C19,37 52,35 52,52"
        stroke="url(#curveGrad)" stroke-width="2.4" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Signal dots -->
  <circle cx="24" cy="30" r="2.6" fill="#60A5FA" filter="url(#glow)"/>
  <circle cx="36" cy="36" r="2.6" fill="#38BDF8" filter="url(#glow)"/>
  <circle cx="47" cy="42" r="2.6" fill="#22D3EE" filter="url(#glow)"/>

  <!-- Satellite nodes -->
  <circle cx="6"  cy="8"  r="3.3" fill="#3B82F6" opacity="0.70"/>
  <circle cx="5"  cy="24" r="2.4" fill="#3B82F6" opacity="0.50"/>
  <circle cx="65" cy="64" r="3.3" fill="#22D3EE" opacity="0.70"/>
  <circle cx="67" cy="48" r="2.4" fill="#22D3EE" opacity="0.50"/>

  <!-- Pre-synaptic node (blue) -->
  <circle cx="19" cy="20" r="12" stroke="#3B82F6" stroke-width="1.8" opacity="0.88"/>
  <circle cx="19" cy="20" r="6.5" fill="#3B82F6" opacity="0.36"/>
  <circle cx="19" cy="20" r="4.5" fill="#3B82F6" filter="url(#glow)"/>

  <!-- Post-synaptic node (cyan) -->
  <circle cx="52" cy="52" r="12" stroke="#22D3EE" stroke-width="1.8" opacity="0.88"/>
  <circle cx="52" cy="52" r="6.5" fill="#22D3EE" opacity="0.36"/>
  <circle cx="52" cy="52" r="4.5" fill="#22D3EE" filter="url(#glow)"/>

  <!-- ══ WORDMARK ══ -->
  <text
    x="86" y="43"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="-0.5"
    fill="white">Synapse</text>

  <!-- Tagline -->
  <text
    x="88" y="59"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
    font-size="10"
    font-weight="400"
    letter-spacing="2.5"
    fill="#94A3B8">KUBERNETES PLATFORM</text>
</svg>
