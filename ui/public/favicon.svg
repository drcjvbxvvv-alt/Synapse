<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="8" y1="8" x2="24" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0F172A"/>

  <!-- S-curve synapse bridge -->
  <path d="M8,9 C8,17 24,15 24,23"
        stroke="url(#g)" stroke-width="2" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Signal dot -->
  <circle cx="16" cy="16" r="2" fill="#38BDF8" filter="url(#glow)"/>

  <!-- Pre-synaptic node (blue) -->
  <circle cx="8"  cy="9"  r="5" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
  <circle cx="8"  cy="9"  r="2.5" fill="#3B82F6" filter="url(#glow)"/>

  <!-- Post-synaptic node (cyan) -->
  <circle cx="24" cy="23" r="5" stroke="#22D3EE" stroke-width="1.5" opacity="0.9"/>
  <circle cx="24" cy="23" r="2.5" fill="#22D3EE" filter="url(#glow)"/>
</svg>
