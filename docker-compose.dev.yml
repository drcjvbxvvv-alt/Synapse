# =============================================================================
# Synapse — 開發環境 Docker Compose
# 用法：
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down -v   # 清除資料
#
# 包含服務：
#   postgres — PostgreSQL 16，自動建立 synapse 資料庫
#   adminer  — 輕量 DB 管理 UI，http://localhost:8080
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DATABASE:-synapse}
      POSTGRES_USER:     ${PG_USER:-synapse}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-Synapse@2026}
      TZ: Asia/Taipei
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout:  5s
      retries:  12
      start_period: 30s
    networks:
      - synapse-dev

  # ---------------------------------------------------------------------------
  # Adminer — DB 管理 UI
  # 存取：http://localhost:8080
  #   系統: PostgreSQL  |  伺服器: postgres  |  使用者: synapse  |  密碼: Synapse@2026  |  資料庫: synapse
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: synapse-adminer-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN:         pepa-linha-dark
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - synapse-dev

volumes:
  pg_data:
    name: synapse-pg-dev-data

networks:
  synapse-dev:
    name: synapse-dev
