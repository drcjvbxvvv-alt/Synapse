host: localhost:8080
info:
  contact:
    name: Synapse Team
  description: Synapse — Kubernetes 多叢集管理平台 REST API
  license:
    name: MIT
  title: Synapse API
  version: "1.0"
paths:
  /ai/runbooks:
    get:
      description: Returns runbooks matching the given reason (e.g. OOMKilled) or
        keyword.
      parameters:
      - description: K8s event reason or keyword
        in: query
        name: reason
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/runbooks.Runbook'
            type: array
      summary: Search runbooks by reason or keyword
      tags:
      - AI
  /api/v1/clusters/{clusterID}/argocd/applications:
    get:
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ArgoCDApplication'
            type: array
      summary: 獲取 ArgoCD 應用列表
      tags:
      - ArgoCD/GitOps
    post:
      consumes:
      - application/json
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 建立請求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ArgoCDApplication'
      summary: 建立 ArgoCD 應用
      tags:
      - ArgoCD/GitOps
  /api/v1/clusters/{clusterID}/argocd/applications/{appName}:
    delete:
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 應用名稱
        in: path
        name: appName
        required: true
        type: string
      - default: true
        description: 是否級聯刪除資源
        in: query
        name: cascade
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      summary: 刪除 ArgoCD 應用
      tags:
      - ArgoCD/GitOps
    get:
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 應用名稱
        in: path
        name: appName
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ArgoCDApplication'
      summary: 獲取 ArgoCD 應用詳情
      tags:
      - ArgoCD/GitOps
    put:
      consumes:
      - application/json
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 應用名稱
        in: path
        name: appName
        required: true
        type: string
      - description: 更新請求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ArgoCDApplication'
      summary: 更新 ArgoCD 應用
      tags:
      - ArgoCD/GitOps
  /api/v1/clusters/{clusterID}/argocd/applications/{appName}/resources:
    get:
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 應用名稱
        in: path
        name: appName
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ArgoCDResource'
