basePath: /api/v1
definitions:
  gin.H:
    additionalProperties: {}
    type: object
  handlers.AuthStatusResponse:
    properties:
      ldap_enabled:
        type: boolean
    type: object
  handlers.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  handlers.LoginRequest:
    properties:
      auth_type:
        description: 認證型別：local, ldap，預設local
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  handlers.UpdateStatusRequest:
    properties:
      status:
        type: string
    required:
    - status
    type: object
  models.ArgoCDApplication:
    properties:
      created_at:
        description: 時間
        type: string
      destination:
        allOf:
        - $ref: '#/definitions/models.ArgoCDDestination'
        description: 目標配置
      health_status:
        description: Healthy, Degraded, Progressing, Suspended, Missing, Unknown
        type: string
      history:
        description: 同步歷史
        items:
          $ref: '#/definitions/models.ArgoCDSyncHistory'
        type: array
      name:
        type: string
      namespace:
        type: string
      project:
        type: string
      reconciled_at:
        type: string
      resources:
        description: 資源樹
        items:
          $ref: '#/definitions/models.ArgoCDResource'
        type: array
      source:
        allOf:
        - $ref: '#/definitions/models.ArgoCDSource'
        description: 源配置
      sync_status:
        description: 狀態
        type: string
      synced_revision:
        description: 同步資訊
        type: string
      target_revision:
        type: string
    type: object
  models.ArgoCDConfig:
    properties:
      argocd_cluster_name:
        description: ArgoCD 中的叢集名稱
        type: string
      argocd_project:
