      consumes:
      - application/json
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 應用名稱
        in: path
        name: appName
        required: true
        type: string
      - description: 回滾請求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RollbackApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      summary: 回滾 ArgoCD 應用
      tags:
      - ArgoCD/GitOps
  /api/v1/clusters/{clusterID}/argocd/applications/{appName}/sync:
    post:
      consumes:
      - application/json
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 應用名稱
        in: path
        name: appName
        required: true
        type: string
      - description: 同步請求
        in: body
        name: request
        schema:
          $ref: '#/definitions/models.SyncApplicationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      summary: 同步 ArgoCD 應用
      tags:
      - ArgoCD/GitOps
  /api/v1/clusters/{clusterID}/argocd/config:
    get:
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ArgoCDConfig'
      summary: 獲取 ArgoCD 配置
      tags:
      - ArgoCD/GitOps
    put:
      consumes:
      - application/json
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 配置資訊
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/models.ArgoCDConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      summary: 儲存 ArgoCD 配置
      tags:
      - ArgoCD/GitOps
  /api/v1/clusters/{clusterID}/argocd/test-connection:
    post:
      consumes:
      - application/json
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 配置資訊
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/models.ArgoCDConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin.H'
      summary: 測試 ArgoCD 連線
      tags:
      - ArgoCD/GitOps
  /api/v1/clusters/{clusterID}/om/control-plane-status:
    get:
      consumes:
      - application/json
      description: 獲取叢集控制面元件（apiserver, scheduler, controller-manager, etcd）的狀態
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ControlPlaneStatusResponse'
      summary: 獲取控制面元件狀態
      tags:
      - O&M
  /api/v1/clusters/{clusterID}/om/health-diagnosis:
    get:
      consumes:
      - application/json
      description: 對叢集進行全面健康診斷，返回健康評分、風險項和診斷建議
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.HealthDiagnosisResponse'
      summary: 獲取叢集健康診斷
      tags:
      - O&M
  /api/v1/clusters/{clusterID}/om/resource-top:
    get:
      consumes:
      - application/json
      description: 獲取指定資源型別的消耗排行榜
      parameters:
      - description: 叢集ID
        in: path
        name: clusterID
        required: true
        type: integer
      - description: 資源型別
        enum:
        - cpu
        - memory
        - disk
        - network
        in: query
        name: type
        required: true
        type: string
      - description: 統計級別
        enum:
        - namespace
        - workload
        - pod
        in: query
        name: level
        required: true
        type: string
      - default: 10
        description: 返回數量
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ResourceTopResponse'
      summary: 獲取資源消耗 Top N
      tags:
      - O&M
  /api/v1/overview/abnormal-workloads:
    get:
      consumes:
      - application/json
      description: 返回異常的 Pod、Deployment、StatefulSet 列表
      parameters:
      - default: 20
        description: 返回數量限制
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/services.AbnormalWorkload'
            type: array
      summary: 獲取異常工作負載
      tags:
      - Overview
  /api/v1/overview/alert-stats:
    get:
      consumes:
      - application/json
      description: 返回所有叢集的告警彙總統計
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.GlobalAlertStats'
      summary: 獲取全域性告警統計
      tags:
      - Overview
  /api/v1/overview/distribution:
    get:
      consumes:
      - application/json
      description: 返回各叢集的 Pod、Node、CPU、記憶體分佈
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ResourceDistributionResponse'
      summary: 獲取資源分佈
      tags:
      - Overview
  /api/v1/overview/resource-usage:
    get:
      consumes:
      - application/json
      description: 返回 CPU、記憶體、儲存的使用率
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.ResourceUsageResponse'
      summary: 獲取資源使用率
      tags:
      - Overview
  /api/v1/overview/stats:
    get:
      consumes:
      - application/json
      description: 返回叢集、節點、Pod 的統計資料以及版本分佈
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.OverviewStatsResponse'
      summary: 獲取總覽統計資料
      tags:
      - Overview
  /api/v1/overview/trends:
    get:
      consumes:
      - application/json
      description: 返回 Pod 和 Node 的歷史趨勢資料
      parameters:
      - default: 7d
        description: '時間範圍: 7d, 30d'
        in: query
        name: timeRange
        type: string
      - default: 1h
        description: '步長: 1h, 6h, 1d'
        in: query
        name: step
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.TrendResponse'
      summary: 獲取趨勢資料
      tags:
      - Overview
  /auth/change-password:
    post:
      consumes:
      - application/json
      parameters:
      - description: 新舊密碼
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: 修改密碼
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: 支援 local / ldap 兩種認證方式，成功後回傳 access token
      parameters:
      - description: 登入資訊
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.LoginResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: 使用者登入
      tags:
      - auth
  /auth/logout:
    post:
      description: 撤銷當前 access token（加入黑名單），清除 refresh token cookie
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: 使用者登出
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: 取得目前登入使用者資訊
      tags:
      - auth
  /auth/refresh:
    post:
      description: 使用 httpOnly cookie 中的 refresh token 無聲換取新 access token（頁面重新整理使用）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/services.LoginResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Refresh access token
      tags:
      - auth
  /auth/status:
    get:
      description: 回傳 LDAP 是否已啟用（供登入頁判斷顯示選項）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthStatusResponse'
      summary: 取得認證系統狀態
