      parameters:
      - description: 使用者 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 狀態（active / inactive）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
