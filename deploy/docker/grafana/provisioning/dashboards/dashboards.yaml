apiVersion: 1

providers:
  - name: 'Synapse Dashboards'
    orgId: 1
    folder: 'Synapse'
    folderUid: 'synapse-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
