version: '3.8'

services:
  # ─── GitLab ──────────────────────────────────────────────────────────────
  gitlab:
    image: gitlab/gitlab-ce:latest
    hostname: gitlab.local
    container_name: gitlab
    restart: always
    ports:
      - "8929:80"
      - "8443:443"
      - "2222:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['initial_root_password'] = 'Gitlab@2026'
        nginx['listen_port'] = 80
        registry_external_url 'http://localhost:5001'
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-logs:/var/log/gitlab
      - gitlab-data:/var/opt/gitlab
    networks:
      - cicd

  # ─── Container Registry (Docker Registry v2) ─────────────────────────────
  # Note: Harbor requires 8+ microservices and cannot be run as a single
  # container. Use the official Harbor installer for production deployments:
  # https://github.com/goharbor/harbor/releases
  # For local CI/CD development, Docker Registry v2 is a simpler alternative.
  registry:
    image: registry:2
    container_name: registry
    restart: always
    ports:
      - "5001:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - cicd

  # ─── ArgoCD ──────────────────────────────────────────────────────────────
  argocd:
    image: argoproj/argocd:latest
    container_name: argocd
    restart: always
    ports:
      - "8081:8080"
      - "8444:443"
    environment:
      ARGOCD_SERVER_INSECURE: "true"
      ARGO_WORKFLOWS_CONTROLLER_PARALLELISM: "10"
    volumes:
      - argocd-data:/var/lib/argocd
    networks:
      - cicd
    command:
      - argocd-server
      - --insecure
      - --loglevel
      - info

  # ─── GitLab Runner ───────────────────────────────────────────────────────
  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab-runner
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitlab-runner-config:/etc/gitlab-runner
    networks:
      - cicd
    environment:
      GITLAB_HOST: "http://gitlab.local"
      RUNNER_REGISTRATION_TOKEN: "glrt_test_token"

networks:
  cicd:
    driver: bridge

volumes:
  gitlab-config:
  gitlab-logs:
  gitlab-data:
  registry-data:
  argocd-data:
  gitlab-runner-config:
