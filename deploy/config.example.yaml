# Synapse 設定範例（config.example.yaml）
# 複製為 config.yaml 並依環境調整；所有值均可透過環境變數覆蓋（見下方注釋）

server:
  port: 8080          # env: SERVER_PORT
  mode: release       # env: SERVER_MODE  (debug | release)

database:
  driver: mysql       # env: DB_DRIVER  (sqlite | mysql)
  host: 127.0.0.1     # env: DB_HOST
  port: 3306          # env: DB_PORT
  username: synapse   # env: DB_USERNAME
  password: ""        # env: DB_PASSWORD
  database: synapse   # env: DB_DATABASE
  charset: utf8mb4    # env: DB_CHARSET
  # 或使用完整 DSN（優先於以上各欄位）：
  # dsn: "synapse:password@tcp(127.0.0.1:3306)/synapse?charset=utf8mb4&parseTime=True&loc=Local"
  # env: DB_DSN
  # MySQL TLS（生產環境強烈建議啟用）：
  tls_enabled: false          # env: DB_TLS_ENABLED
  tls_ca_cert: ""             # env: DB_TLS_CA_CERT  — CA 憑證路徑，留空 = 加密但不驗證伺服器身分

jwt:
  secret: "change-me-in-production"  # env: JWT_SECRET
  expire_time: 24                     # env: JWT_EXPIRE_TIME  (hours)

log:
  level: info    # env: LOG_LEVEL   (debug | info | warn | error)
  format: json   # env: LOG_FORMAT  (text | json) — json 方便 Promtail/Filebeat 解析

k8s:
  default_namespace: default  # env: K8S_DEFAULT_NAMESPACE
  informer_sync_timeout: 30   # env: INFORMER_SYNC_TIMEOUT  (seconds)

app:
  env: production  # env: APP_ENV  (production | development)
                   #   production  = ENCRYPTION_KEY 未設定時拒絕啟動
                   #   development = ENCRYPTION_KEY 未設定時僅警告（不建議用於正式環境）

security:
  # 選擇一種方式提供加密金鑰（production 環境必填其一）：
  encryption_key: ""       # env: ENCRYPTION_KEY  — 直接提供金鑰（不建議明文寫入設定檔）
  encryption_key_file: ""  # env: ENCRYPTION_KEY_FILE  — 從檔案讀取金鑰（建議用法）
                           #   範例：/etc/synapse/secrets/encryption.key（chmod 400）
                           #   生成：openssl rand -hex 32 > /etc/synapse/secrets/encryption.key
  k8s_tls_policy: warn     # env: K8S_TLS_POLICY  (strict | warn | skip)
                           #   strict = 無 CA 憑證時拒絕連線（最安全）
                           #   warn   = 無 CA 憑證時警告並繼續（預設，相容性優先）
                           #   skip   = 靜默跳過 TLS 驗證（僅限實驗室環境）

# ── 可觀測性 ─────────────────────────────────────────────────────────────────
# 控制 Synapse 自身的 Prometheus metrics 端點、健康探針。
# 所有端點均不計入操作審計日誌。
observability:
  enabled: true             # env: OBSERVABILITY_ENABLED
                            #   false = 完全關閉，不建立 Registry，不暴露任何端點
  metrics_path: /metrics    # env: METRICS_PATH
  metrics_token: ""         # env: METRICS_TOKEN
                            #   空字串 = 不驗證；有值 = 需帶 Authorization: Bearer <token>
  health_path: /healthz     # env: HEALTH_PATH  — 永遠 200，供 LB / systemd 存活探針
  ready_path: /readyz       # env: READY_PATH   — 檢查 DB；DB 不通時回 503
