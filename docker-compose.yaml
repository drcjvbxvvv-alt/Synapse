# ==========================================
# Synapse Docker Compose
# ==========================================
# 使用方法:
#   cp .env.example .env  # 复制并配置环境变量
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
# ==========================================


services:
  # ==========================================
  # PostgreSQL 数据库
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - synapse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ==========================================
  # Synapse 应用服务
  # ==========================================
  synapse:
    build:
      context: .
      dockerfile: Dockerfile
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/synapse:${VERSION:-latest}
    container_name: synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      grafana:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SERVER_MODE: ${SERVER_MODE:-release}
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: synapse
      DB_PASSWORD: ${PG_PASSWORD}
      DB_DATABASE: synapse
      DB_SSL_MODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_TIME: 24
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - synapse_logs:/app/logs
    networks:
      - synapse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 100s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ==========================================
  # Grafana
  # ==========================================
  grafana:
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/grafana:10.2.0
    container_name: synapse-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_ANONYMOUS_ORG_NAME: Main Org.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: info
      # 配置子路径，通过代理访问
      GF_SERVER_ROOT_URL: "/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      TZ: Asia/Shanghai
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - synapse-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Grafana 初始化（自动生成 API Key）
  # ==========================================
  grafana-init:
    image: registry.cn-hangzhou.aliyuncs.com/clay-wangzhi/curl:8.16.0
    container_name: synapse-grafana-init
    user: "0:0"  # 以 root 用户运行，解决权限问题
    depends_on:
      grafana:
        condition: service_healthy
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_USER: admin
      GRAFANA_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./deploy/docker/grafana/secrets:/secrets
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "⏳ 等待 Dashboard 加载完成..."
        sleep 5

        echo "🔧 设置 Synapse 文件夹权限..."
        curl -s -X POST \
          -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          -H "Content-Type: application/json" \
          -d '{"items":[{"role":"Viewer","permission":1},{"role":"Editor","permission":2}]}' \
          "$${GRAFANA_URL}/api/folders/synapse-folder/permissions"
        echo " ✅ 权限设置完成"

        echo ""
        echo "🔑 创建 Service Account 和 API Token..."

        SA_EXISTS=$$(curl -s -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          "$${GRAFANA_URL}/api/serviceaccounts/search?query=synapse" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)

        if [ -z "$$SA_EXISTS" ]; then
          echo "  📝 创建新的 Service Account..."
          SA_RESULT=$$(curl -s -X POST \
            -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d '{"name":"synapse","role":"Admin","isDisabled":false}' \
            "$${GRAFANA_URL}/api/serviceaccounts")
          SA_ID=$$(echo "$$SA_RESULT" | grep -o '"id":[0-9]*' | cut -d: -f2)
          echo "  ✅ Service Account 创建成功，ID: $$SA_ID"
        else
          SA_ID=$$SA_EXISTS
          echo "  ℹ️  Service Account 已存在，ID: $$SA_ID"
        fi

        curl -s -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          "$${GRAFANA_URL}/api/serviceaccounts/$$SA_ID/tokens" | \
          grep -o '"id":[0-9]*' | cut -d: -f2 | while read TOKEN_ID; do
            curl -s -X DELETE \
              -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
              "$${GRAFANA_URL}/api/serviceaccounts/$$SA_ID/tokens/$$TOKEN_ID"
          done

        echo "  🔐 生成新的 API Token..."
        TOKEN_RESULT=$$(curl -s -X POST \
          -u "$${GRAFANA_USER}:$${GRAFANA_PASSWORD}" \
          -H "Content-Type: application/json" \
          -d '{"name":"synapse-token","secondsToLive":0}' \
          "$${GRAFANA_URL}/api/serviceaccounts/$$SA_ID/tokens")

        API_KEY=$$(echo "$$TOKEN_RESULT" | grep -o '"key":"[^"]*"' | cut -d'"' -f4)

        if [ -n "$$API_KEY" ]; then
          echo "$$API_KEY" > /secrets/grafana_api_key
          echo "  ✅ API Token 已保存到 /secrets/grafana_api_key"
          echo ""
          echo "=========================================="
          echo "🎉 Grafana 初始化完成！"
          echo "=========================================="
        else
          echo "  ❌ Token 创建失败: $$TOKEN_RESULT"
          exit 1
        fi
    networks:
      - synapse-network
    restart: "no"

# ==========================================
# 数据卷
# ==========================================
volumes:
  pg_data:
    name: synapse-pg-data
  grafana_data:
    name: synapse-grafana-data
  synapse_logs:
    name: synapse-logs

# ==========================================
# 网络
# ==========================================
networks:
  synapse-network:
    name: synapse-network
    driver: bridge
